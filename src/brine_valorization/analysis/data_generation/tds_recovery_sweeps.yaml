tds_sweep_feed_n_bleed_mvc:
  build_defaults:
    NaCl: 360
    add_mvc: True 
    add_feed_bleed_for_acid_base: True
    stages: 3
  build_loop:
    stages:
      - 1
      - 2    
      - 3
    sweep_param_loop:
      nacl:
        type: LinearSample
        param: fs.nacl_concentraiton
        lower_limit: 360
        upper_limit: 20
        num_samples: 18
